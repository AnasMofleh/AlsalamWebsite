<!doctype html>
<html lang="sv">

<head>
    <base href="/">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sponsorer - Al-Salam Moske</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Pacifico&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <link href="lib/animate/animate.min.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <div id="header-placeholder"></div>

    <div class="container py-5">
        <div id="sponsors-placeholder"></div>
    </div>

    <div id="contact-us-placeholder"></div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="lib/wow/wow.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/waypoints/waypoints.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>
    <script src="js/main.js"></script>
    <script type="module" src="/langugaes/js/i18n.js" defer></script>
    <script>
        $(function () {
            $("#header-placeholder").load("/header.html", function () {
                if (window.reapplyTranslations) {
                    setTimeout(() => window.reapplyTranslations(), 50);
                }
            });
            $("#sponsors-placeholder").load("/sponsors/sponsors.html", function () {
                // Initialize the sponsors carousel (script can't run via innerHTML)
                const SPONSOR_PATH = '/img/sponsors/';
                const sponsorImages = [
                    'a2m.png',
                    '360tandklinik.jpeg',
                    'jcFlytt.png',
                    'konsentdent.jpg',
                    'palmyra.png',
                    'privtaBarn.png',
                    'sweethouse.png',
                    'astorptandlakare.png',
                    'TamimSalong.png',
                    'bazarAlsham.jpeg'
                ];

                const wrapLtr = document.getElementById('wrap-ltr');
                const wrapRtl = document.getElementById('wrap-rtl');
                const trackLtr = document.getElementById('track-ltr');
                const trackRtl = document.getElementById('track-rtl');

                if (!wrapLtr || !wrapRtl || !trackLtr || !trackRtl) return;

                function shuffle(arr) {
                    const a = arr.slice();
                    for (let i = a.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [a[i], a[j]] = [a[j], a[i]];
                    }
                    return a;
                }

                function buildTrackHtml(images) {
                    return images.map(name => {
                        const safeName = name.replace(/[-_]/g, ' ').replace(/\..+$/, '');
                        return '<div class="sponsor-item" role="listitem"><img src="' + SPONSOR_PATH + name + '" alt="' + safeName + '"></div>';
                    }).join('');
                }

                const ltrImages = shuffle(sponsorImages);
                const rtlImages = shuffle(sponsorImages);
                const ltrHtml = buildTrackHtml(ltrImages);
                const rtlHtml = buildTrackHtml(rtlImages);

                trackLtr.innerHTML = ltrHtml + ltrHtml;
                trackRtl.innerHTML = rtlHtml + rtlHtml;

                const imgs = document.querySelectorAll('#wrap-ltr .sponsor-item img, #wrap-rtl .sponsor-item img');
                Promise.all(Array.from(imgs).map(img => {
                    if (img.complete) return Promise.resolve();
                    return new Promise(res => { img.onload = img.onerror = res; });
                })).then(() => {
                    wrapLtr.classList.add('is-ready');
                    wrapRtl.classList.add('is-ready');
                });

                if (window.reapplyTranslations) {
                    setTimeout(() => window.reapplyTranslations(), 100);
                }
            });
            $("#contact-us-placeholder").load("/contact-us.html", function () {
                if (window.reapplyTranslations) {
                    setTimeout(() => window.reapplyTranslations(), 50);
                }
            });
        });
    </script>
</body>

</html>
