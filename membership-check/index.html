<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="utf-8">
    <title>Medlemsportal — Al Salam Center</title>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <style>
        :root {
            --green: #1a8a1f;
            --green-lt: #e8f5e9;
            --gold: #e8b331;
            --red: #dc3545;
            --bg: #f5f7f5;
            --card: #fff;
            --text: #1a1a1a;
            --muted: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 1px 3px rgba(0, 0, 0, .06), 0 4px 16px rgba(0, 0, 0, .04);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Plus Jakarta Sans", sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 28px 14px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-shrink: 0;
            margin-bottom: 14px;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .topbar-logo {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 6px rgba(26, 138, 31, .12), 0 6px 24px rgba(0, 0, 0, .08);
            overflow: hidden;
        }

        .topbar-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 6px;
        }

        .topbar-brand h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -.02em;
        }

        .topbar-brand h1 span {
            color: var(--green);
        }

        .lang-pills {
            display: flex;
            gap: 5px;
            background: var(--card);
            border-radius: 16px;
            padding: 5px;
            box-shadow: var(--shadow);
        }

        .lang-pills button {
            background: none;
            border: none;
            padding: 10px 20px;
            border-radius: 13px;
            font-size: .9rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--muted);
            transition: all .2s;
            font-family: inherit;
        }

        .lang-pills button.active {
            background: var(--green);
            color: #fff;
            box-shadow: 0 2px 12px rgba(26, 138, 31, .25);
        }

        .search-bar {
            display: flex;
            gap: 14px;
            flex-shrink: 0;
            margin-bottom: 8px;
        }

        .search-bar input {
            flex: 1;
            height: 64px;
            padding: 0 24px;
            border: 2px solid var(--border);
            border-radius: 18px;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: .05em;
            font-family: inherit;
            color: var(--text);
            background: var(--card);
            transition: border .3s, box-shadow .3s;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 6px rgba(26, 138, 31, .1);
        }

        .search-bar input.error {
            border-color: var(--red);
        }

        .search-bar input.success {
            border-color: var(--green);
        }

        .btn-go {
            height: 64px;
            padding: 0 38px;
            border: none;
            border-radius: 18px;
            background: var(--green);
            color: #fff;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn-go:hover {
            background: #157519;
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(26, 138, 31, .3);
        }

        .btn-go:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .hint-row {
            font-size: .85rem;
            color: var(--muted);
            flex-shrink: 0;
            min-height: 24px;
            padding: 0 4px;
            margin-bottom: 12px;
        }

        .hint-row .err {
            color: var(--red);
            display: none;
        }

        .cards-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
            min-height: 0;
        }

        .chk-card {
            background: var(--card);
            border-radius: 20px;
            padding: 0 24px;
            box-shadow: var(--shadow);
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 18px;
            height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all .45s ease;
            flex-shrink: 0;
        }

        .chk-card.visible {
            height: 84px;
            opacity: 1;
            padding: 14px 24px;
        }

        .chk-card.success {
            border-color: rgba(26, 138, 31, .25);
            background: var(--green-lt);
        }

        .chk-card.fail {
            border-color: rgba(220, 53, 69, .2);
            background: #fff5f5;
        }

        .chk-card.locked {
            border-color: var(--border);
            opacity: .5;
        }

        .chk-card.locked.visible {
            opacity: .5;
        }

        .chk-card .cc-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .chk-card.success .cc-icon {
            background: var(--green);
            color: #fff;
        }

        .chk-card.fail .cc-icon {
            background: var(--red);
            color: #fff;
        }

        .chk-card.locked .cc-icon {
            background: #e5e7eb;
            color: #9ca3af;
        }

        .chk-card .cc-body {
            flex: 1;
            min-width: 0;
        }

        .chk-card .cc-body h4 {
            font-size: 1.05rem;
            font-weight: 700;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chk-card .cc-body .cc-sub {
            font-size: .85rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chk-card .cc-body .cc-sub b {
            color: var(--green);
        }

        .chk-card .cc-pts {
            font-weight: 800;
            font-size: 1.05rem;
            color: var(--green);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .chk-card .cc-btn {
            flex-shrink: 0;
            padding: 9px 22px;
            border-radius: 13px;
            font-weight: 700;
            font-size: .88rem;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            transition: transform .15s;
        }

        .chk-card .cc-btn:hover {
            transform: translateY(-1px);
        }

        .cc-btn.go {
            background: var(--green);
            color: #fff;
        }

        .cc-btn.red {
            background: var(--red);
            color: #fff;
        }

        /* Results row — circle + pyramid side by side on tablet+, stacked on mobile */
        .results-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-shrink: 0;
        }

        @media(max-width:600px) {
            .results-row {
                flex-direction: column;
                gap: 10px;
            }
        }

        /* Spinning points circle */
        .pts-circle-wrap {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 0 0;
            opacity: 0;
            transition: opacity .5s;
        }

        .pts-circle-wrap.show {
            opacity: 1;
        }

        .pts-circle {
            position: relative;
            width: 170px;
            height: 170px;
        }

        .pts-circle svg {
            width: 100%;
            height: 100%;
        }

        .pts-circle .ring-bg {
            fill: none;
            stroke: var(--border);
            stroke-width: 7;
        }

        .pts-circle .ring-fg {
            fill: none;
            stroke: url(#ptsGrad);
            stroke-width: 7;
            stroke-linecap: round;
            transform-origin: 50% 50%;
            animation: spinRing 3s linear infinite;
        }

        @keyframes spinRing {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .pts-circle .circle-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .pts-circle .circle-num {
            font-size: 3.4rem;
            font-weight: 800;
            color: var(--green);
            line-height: 1;
        }

        .lvl-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: .78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .03em;
        }

        .lvl-tag.l1 {
            background: #fef3c7;
            color: #b45309;
        }

        .lvl-tag.l2 {
            background: #f0fdf4;
            color: #166534;
        }

        .lvl-tag.l3 {
            background: #ecfdf5;
            color: #065f46;
        }

        .lvl-tag.l4 {
            background: #fef9c3;
            color: #854d0e;
        }

        .lvl-tag.l5 {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #92400e;
            border: 1px solid #fbbf24;
        }

        /* ── Level Pyramid ── */
        .pyramid-wrap {
            flex-shrink: 0;
            opacity: 0;
            transition: opacity .5s;
            padding: 0 12px;
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .pyramid-wrap.show {
            opacity: 1;
        }

        /* Arrow points INTO the pyramid from the outer side */
        .pyr-arrow {
            position: absolute;
            right: -22px;
            top: 0;
            width: 0;
            height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-right: 18px solid var(--green);
            transition: top .5s ease;
            opacity: 0;
            filter: drop-shadow(0 0 6px rgba(26, 138, 31, .5));
            z-index: 5;
        }

        [dir="rtl"] .pyr-arrow {
            right: auto;
            left: -22px;
            border-right: none;
            border-left: 18px solid var(--green);
        }

        .pyr-arrow.show {
            opacity: 1;
            animation: arrowBounce .7s ease-in-out infinite;
        }

        [dir="rtl"] .pyr-arrow.show {
            animation: arrowBounceRtl .7s ease-in-out infinite;
        }

        @keyframes arrowBounce {
            0%,
            100% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(8px);
            }
        }

        @keyframes arrowBounceRtl {
            0%,
            100% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(-8px);
            }
        }

        .pyramid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            width: 100%;
            max-width: 360px;
        }

        .pyr-level {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 28px;
            border-radius: 6px;
            font-weight: 700;
            font-size: .72rem;
            transition: all .4s ease;
            position: relative;
            cursor: default;
            border: 2px solid var(--border);
            background: #f9fafb;
            color: var(--muted);
            clip-path: polygon(6% 0, 94% 0, 100% 100%, 0% 100%);
        }

        .pyr-level.l1w {
            width: 100%;
        }

        .pyr-level.l2w {
            width: 80%;
        }

        .pyr-level.l3w {
            width: 64%;
        }

        .pyr-level.l4w {
            width: 50%;
        }

        .pyr-level.l5w {
            width: 38%;
        }

        .pyr-level.done {
            background: #c8e6c9;
            border-color: #a5d6a7;
            color: #2e7d32;
        }

        .pyr-level.current {
            background: var(--green);
            border-color: #157519;
            color: #fff;
            height: 34px;
            font-size: .82rem;
            box-shadow: 0 0 20px rgba(26, 138, 31, .35), 0 4px 12px rgba(26, 138, 31, .2);
            animation: pyrPulse 2s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes pyrPulse {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(26, 138, 31, .35), 0 4px 12px rgba(26, 138, 31, .2);
            }

            50% {
                box-shadow: 0 0 32px rgba(26, 138, 31, .5), 0 6px 20px rgba(26, 138, 31, .3);
            }
        }

        .pyr-icon {
            font-size: .85rem;
            flex-shrink: 0;
        }

        .pyr-level.current .pyr-icon {
            font-size: 1rem;
        }

        .pyr-name {
            white-space: nowrap;
        }

        .pyr-pts {
            font-size: .6rem;
            opacity: .7;
            white-space: nowrap;
        }

        .pyramid-info {
            text-align: center;
            font-size: .7rem;
            font-weight: 600;
            color: var(--muted);
            margin-top: 8px;
        }

        .pyramid-info b {
            color: var(--green);
        }

        @media(max-width:500px) {
            .pyr-level {
                height: 24px;
                font-size: .62rem;
                gap: 4px;
                border-radius: 5px;
            }

            .pyr-level.current {
                height: 28px;
                font-size: .7rem;
            }

            .pyr-icon {
                font-size: .7rem;
            }

            .pyr-level.current .pyr-icon {
                font-size: .85rem;
            }

            .pyr-pts {
                font-size: .52rem;
            }

            .pyramid {
                max-width: 300px;
            }
        }

        .timer-wrap {
            flex-shrink: 0;
            height: 5px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            opacity: 0;
            transition: opacity .3s;
        }

        .timer-wrap.show {
            opacity: 1;
        }

        .timer-fill {
            height: 100%;
            background: var(--green);
            width: 100%;
            transition: width 90s linear;
        }

        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            display: none;
        }

        .confetti-container.active {
            display: block;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: cf2 linear forwards;
        }

        @keyframes cf2 {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 1;
            }

            70% {
                opacity: .8;
            }

            100% {
                transform: translate(var(--dx), var(--dy)) rotate(var(--rot));
                opacity: 0;
            }
        }

        @media(max-width:500px) {
            .topbar-brand h1 {
                font-size: 1.1rem;
            }

            .btn-go {
                padding: 0 18px;
                font-size: 1rem;
            }

            .chk-card .cc-btn {
                font-size: .7rem;
                padding: 6px 12px;
            }
        }

        /* Keypad */
        .keypad {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 8px;
            overflow: hidden;
            max-height: 300px;
            transition: max-height .4s ease, opacity .4s ease, margin .4s ease;
        }

        .keypad.hidden {
            max-height: 0;
            opacity: 0;
            margin-bottom: 0;
        }

        .kp-btn {
            height: 58px;
            border: none;
            border-radius: 16px;
            font-size: 1.6rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all .15s;
            background: var(--card);
            color: var(--text);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .kp-btn:active {
            transform: scale(.95);
            background: #e5e7eb;
        }

        .kp-btn.kp-bs {
            font-size: 1.3rem;
            color: var(--muted);
        }

        .kp-btn.kp-go {
            background: var(--green);
            color: #fff;
            font-size: 1.1rem;
            gap: 6px;
        }

        .kp-btn.kp-go:active {
            background: #157519;
        }

        @media(max-width:500px) {
            .kp-btn {
                height: 48px;
                font-size: 1.3rem;
                border-radius: 14px;
            }

            .kp-btn.kp-go {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="topbar">
            <div class="topbar-brand">
                <a href="/" class="topbar-logo"><img src="/img/Al-Salam-Center-Logo.png" alt="Logo"></a>
                <h1>Medlems<span>portal</span></h1>
            </div>
            <div class="lang-pills" id="langBtns">
                <button data-lang="sv" class="active">SV</button>
                <button data-lang="en">EN</button>
                <button data-lang="ar">AR</button>
            </div>
        </div>
        <div class="search-bar">
            <input type="text" id="pnr" placeholder="ÅÅÅÅMMDD-XXXX" maxlength="13" autocomplete="off"
                data-tr-placeholder="ph">
            <button class="btn-go" id="btnGo" onclick="doCheck()"><i class="fas fa-search"></i> <span
                    data-tr="go">Kontrollera</span></button>
        </div>
        <div class="hint-row"><span data-tr="hint">Ange ditt svenska personnummer</span><span class="err" id="pnrErr"
                data-tr="err"> — Ogiltigt personnummer</span></div>
        <div class="keypad" id="keypad">
            <button class="kp-btn" onclick="kpType('1')">1</button>
            <button class="kp-btn" onclick="kpType('2')">2</button>
            <button class="kp-btn" onclick="kpType('3')">3</button>
            <button class="kp-btn" onclick="kpType('4')">4</button>
            <button class="kp-btn" onclick="kpType('5')">5</button>
            <button class="kp-btn" onclick="kpType('6')">6</button>
            <button class="kp-btn" onclick="kpType('7')">7</button>
            <button class="kp-btn" onclick="kpType('8')">8</button>
            <button class="kp-btn" onclick="kpType('9')">9</button>
            <button class="kp-btn kp-bs" onclick="kpBack()"><i class="fas fa-backspace"></i></button>
            <button class="kp-btn" onclick="kpType('0')">0</button>
            <button class="kp-btn kp-go" onclick="doCheck()"><i class="fas fa-check"></i> <span
                    data-tr="go">Kontrollera</span></button>
        </div>
        <div class="cards-area" id="cardsArea">
            <div class="chk-card" id="card1">
                <div class="cc-icon"><i class="fas fa-id-card"></i></div>
                <div class="cc-body">
                    <h4 data-tr="c1t">FIFS Medlemskap</h4><span class="cc-sub" data-tr="c1s">Via skattsedel</span>
                </div>
                <div class="cc-pts"></div>
            </div>
            <div class="chk-card locked" id="card2">
                <div class="cc-icon"><i class="fas fa-calendar-check"></i></div>
                <div class="cc-body">
                    <h4 data-tr="c2t">Månadsgivare</h4><span class="cc-sub" data-tr="c2s">Via autogiro</span>
                </div>
                <div class="cc-pts"></div>
            </div>
            <div class="chk-card locked" id="card3">
                <div class="cc-icon"><i class="fas fa-hand-holding-heart"></i></div>
                <div class="cc-body">
                    <h4 data-tr="c3t">Donator</h4><span class="cc-sub" data-tr="soon">Kommer snart</span>
                </div>
                <div class="cc-pts"></div>
            </div>
            <div class="chk-card locked" id="card4">
                <div class="cc-icon"><i class="fas fa-school"></i></div>
                <div class="cc-body">
                    <h4 data-tr="c4t">Skolregistrering</h4><span class="cc-sub" data-tr="soon">Kommer snart</span>
                </div>
                <div class="cc-pts"></div>
            </div>
        </div>
        <div class="results-row" id="resultsRow">
        <div class="pts-circle-wrap" id="ptsFooter">
            <div class="pts-circle">
                <svg viewBox="0 0 110 110">
                    <defs>
                        <linearGradient id="ptsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#1a8a1f" />
                            <stop offset="50%" stop-color="#e8b331" />
                            <stop offset="100%" stop-color="#1a8a1f" />
                        </linearGradient>
                    </defs>
                    <circle class="ring-bg" cx="55" cy="55" r="48" />
                    <circle class="ring-fg" cx="55" cy="55" r="48" stroke-dasharray="301.6 301.6" stroke-dashoffset="301.6" />
                </svg>
                <div class="circle-center">
                    <span class="circle-num" id="ptsNum">0</span>
                </div>
            </div>
        </div>
        <div class="pyramid-wrap" id="pyramidWrap">
            <div class="pyr-arrow" id="pyrArrow"></div>
            <div class="pyramid" id="pyramid"></div>
            <div class="pyramid-info" id="pyramidInfo"></div>
        </div>
        </div>
        <div class="timer-wrap" id="timerWrap">
            <div class="timer-fill" id="timerFill"></div>
        </div>
    </div>
    <div class="confetti-container" id="confetti"></div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script>
        (function () {
            "use strict";
