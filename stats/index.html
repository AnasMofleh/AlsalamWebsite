<!DOCTYPE html>
<html lang="en">

<head>
    <base href="/">
    <meta charset="utf-8">
    <title>Al-Salam Donations Stats v2</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Pacifico&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <link href="lib/animate/animate.min.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --stats-bg: #f8f9fa;
            --stats-card-bg: #ffffff;
            --stats-text: #212529;
            --stats-muted: #6c757d;
            --stats-pill-bg: #f5f7fa;
            --stats-pill-border: #e2e8f0;
            --stats-pill-text: #34495e;
        }

        body.theme-dark {
            --stats-bg: #0f172a;
            --stats-card-bg: #1e293b;
            --stats-text: #e2e8f0;
            --stats-muted: #94a3b8;
            --stats-pill-bg: #334155;
            --stats-pill-border: #475569;
            --stats-pill-text: #e2e8f0;
        }

        body {
            background: var(--stats-bg);
            color: var(--stats-text);
            font-size: 1.12rem;
            transition: background-color 0.25s ease, color 0.25s ease;
        }

        .stats-v2-wrap {
            margin-top: 28px;
            margin-bottom: 60px;
        }

        .stats-layout {
            --stats-main-width: 75%;
            --stats-divider-size: 8px;
        }

        .stats-divider {
            display: none;
        }

        .stats-v2-card {
            background: var(--stats-card-bg) !important;
            color: var(--stats-text);
            border-radius: 16px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
        }

        .stats-v2-card-main {
            position: relative;
        }

        .theme-switch-corner {
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
        }

        .corner-controls-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-corner {
            position: absolute;
            top: 28px;
            right: 14px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .corner-logo {
            width: 76px;
            height: 76px;
            object-fit: contain;
            border-radius: 8px;
        }

        .theme-switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
        }

        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .theme-slider {
            position: absolute;
            inset: 0;
            cursor: pointer;
            background-color: #d1d5db;
            border-radius: 999px;
            transition: .2s;
        }

        .theme-slider:before {
            position: absolute;
            content: "";
            width: 22px;
            height: 22px;
            left: 3px;
            top: 3px;
            border-radius: 50%;
            background: #fff;
            transition: .2s;
        }

        .theme-switch input:checked+.theme-slider {
            background-color: #0d6efd;
        }

        .theme-switch input:checked+.theme-slider:before {
            transform: translateX(24px);
        }

        body.theme-dark .stats-v2-card {
            border-color: rgba(148, 163, 184, 0.22);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .stats-v2-theme-btn {
            border: 1px solid #d1d5db;
            background: #fff;
            color: #111827;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 1rem;
            font-weight: 600;
        }

        .stats-v2-home-btn {
            border-radius: 999px;
            padding: 8px 16px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .stats-top-row {
            padding-left: 0;
            padding-right: 180px;
            margin-top: 56px;
        }

        .stats-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stats-brand-logo {
            width: 56px;
            height: 56px;
            object-fit: contain;
            border-radius: 8px;
        }

        .live-badge-inline {
            display: none;
        }

        @media (min-width: 992px) {
            .stats-layout {
                flex-wrap: nowrap;
                align-items: stretch;
                --bs-gutter-x: 0.35rem;
            }

            .stats-layout>.stats-main-col {
                flex: 0 0 var(--stats-main-width);
                width: var(--stats-main-width);
                max-width: none;
            }

            .stats-layout>.donation-side-col {
                flex: 1 1 0;
                width: auto;
                max-width: none;
                min-width: 300px;
            }

            .stats-layout>.stats-divider {
                display: flex;
                flex: 0 0 var(--stats-divider-size);
                width: var(--stats-divider-size);
                max-width: var(--stats-divider-size);
                align-items: stretch;
                justify-content: center;
                padding-left: 0 !important;
                padding-right: 0 !important;
                cursor: col-resize;
                touch-action: none;
                user-select: none;
                outline: none;
            }

            .stats-layout>.stats-divider::before {
                content: "";
                width: 4px;
                margin: 6px 0;
                border-radius: 999px;
                background: linear-gradient(180deg, rgba(13, 110, 253, 0.18) 0%, rgba(25, 135, 84, 0.55) 100%);
                opacity: 0.6;
                transition: opacity 0.2s ease, transform 0.2s ease;
            }

            .stats-layout>.stats-divider:hover::before,
            .stats-layout>.stats-divider:focus-visible::before,
            .stats-layout.is-resizing>.stats-divider::before {
                opacity: 1;
                transform: scaleX(1.15);
            }

            .stats-layout>.stats-main-col,
            .stats-layout>.donation-side-col {
                transition: flex-basis 0.18s ease, width 0.18s ease;
            }

            .stats-layout.is-resizing>.stats-main-col,
            .stats-layout.is-resizing>.donation-side-col {
                transition: none;
            }
        }

        body.stats-is-resizing,
        body.stats-is-resizing * {
            cursor: col-resize !important;
            user-select: none !important;
        }

        @media (max-width: 768px) {
            .stats-top-row {
                padding-left: 0;
                padding-right: 84px;
                margin-top: 64px;
            }

            .stats-v2-wrap .row.g-4 {
                flex-direction: column !important;
            }

            .logo-corner {
                top: 10px;
                right: 10px;
                align-items: flex-end;
            }

            .logo-corner .badge {
                display: none;
            }

            .live-badge-inline {
                display: inline-flex;
                align-items: center;
            }
        }

        body.theme-dark .stats-v2-theme-btn {
            border-color: #64748b;
            background: #1f2937;
            color: #e2e8f0;
        }

        .stats-v2-total {
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 800;
            background: linear-gradient(90deg, #196F15 0%, #15546F 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
            text-align: center;
            letter-spacing: -2px;
            direction: ltr;
            unicode-bidi: bidi-override;
            white-space: nowrap;
        }

        .stats-v2-total-suffix {
            font-size: 0.3em;
            font-weight: 700;
            letter-spacing: 0;
            vertical-align: middle;
        }

        body.theme-dark .stats-v2-total {
            background: linear-gradient(90deg, #3a9fd4 0%, #2ecc71 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-v2-card h2 {
            font-size: clamp(2rem, 4.2vw, 3rem);
        }

        body.theme-dark .stats-v2-card h2 {
            color: #ffffff;
        }

        .stats-v2-card h4 {
            font-size: clamp(1.6rem, 3.2vw, 2.2rem);
        }

        body.theme-dark .stats-v2-card h4 {
            color: #ffffff;
        }

        .stats-v2-card p,
        .stats-v2-card small,
        .stats-v2-card .meta,
        .stats-v2-card .donation-amount,
        .stats-v2-card .milestone-pill,
        .stats-v2-card .badge,
        .stats-v2-card .stats-v2-theme-btn,
        .stats-v2-card .btn {
            font-size: 1.08rem !important;
        }

        .stats-v2-progress {
            height: 22px;
            border-radius: 999px;
            background: #e9ecef;
            overflow: hidden;
        }

        .stats-v2-progress .bar {
            height: 100%;
            width: 0%;
            border-radius: 999px;
            background: linear-gradient(90deg, #198754 0%, #0d6efd 100%);
            transition: width 900ms ease;
        }

        .stats-breakdown {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .stats-breakdown-item {
            font-weight: 600;
        }

        .milestones {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .milestone-pill {
            border-radius: 999px;
            font-size: 0.85rem;
            padding: 6px 12px;
            background: var(--stats-pill-bg);
            border: 1px solid var(--stats-pill-border);
            color: var(--stats-pill-text);
        }

        .milestone-pill.closest {
            background: #0d6efd;
            border-color: #0d6efd;
            color: #fff;
        }

        .stats-sponsors {
            --gap: 24px;
            --speed-ltr: 22s;
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid #eef2f7;
        }

        body.theme-dark .stats-sponsors {
            border-top-color: rgba(148, 163, 184, 0.2);
        }

        .stats-sponsors .sponsor-wrap {
            margin-bottom: 0;
        }

        .stats-sponsors .sponsor-item {
            height: clamp(76px, 10vw, 108px);
            padding: 8px 14px;
        }

        .stats-sponsors .sponsor-item img {
            max-height: clamp(46px, 7vw, 72px);
            max-width: clamp(96px, 16vw, 150px);
        }

        .donation-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .donation-item {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #eef2f7;
        }

        .donation-item:last-child {
            border-bottom: none;
        }

        .donation-item .meta {
            color: var(--stats-muted);
            font-size: 0.9rem;
        }

        .donation-amount {
            font-weight: 700;
            color: #0d6efd;
            white-space: nowrap;
        }

        .donation-message {
            font-size: 1.02rem;
            line-height: 1.45;
            font-weight: 600;
            color: var(--stats-text);
            margin-top: 4px;
        }

        .donation-side-col .stats-v2-card {
            display: flex;
            flex-direction: column;
            position: relative;
            padding-top: 64px !important;
        }

        .donation-side-col .donation-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }

        .qr-switch-inline {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--stats-text);
            position: absolute;
            top: 14px;
            right: 14px;
            z-index: 6;
            background: var(--stats-card-bg);
            border: 1px solid var(--stats-pill-border);
            border-radius: 999px;
            padding: 6px 10px;
            max-width: calc(100% - 28px);
        }

        .donation-title-row {
            margin-bottom: 12px;
            padding-right: 6px;
        }

        .qr-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }

        .qr-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .qr-slider {
            position: absolute;
            inset: 0;
            cursor: pointer;
            background-color: #d1d5db;
            border-radius: 999px;
            transition: .2s;
        }

        .qr-slider:before {
            position: absolute;
            content: "";
            width: 20px;
            height: 20px;
            left: 3px;
            top: 3px;
            border-radius: 50%;
            background: #fff;
            transition: .2s;
        }

        .qr-switch input:checked+.qr-slider {
            background-color: #0d6efd;
        }

        .qr-switch input:checked+.qr-slider:before {
            transform: translateX(22px);
        }

        .swish-qr-wrap {
            margin-top: 12px;
            margin-bottom: 12px;
            text-align: center;
            border: 1px dashed var(--stats-pill-border);
            border-radius: 12px;
            padding: 14px;
            background: var(--stats-pill-bg);
        }

        .swish-qr-wrap img {
            max-width: 230px;
            width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .qr-donations-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-top: 14px;
            margin-bottom: 0;
        }

        .swish-number {
            font-size: clamp(1.9rem, 4vw, 2.35rem);
            font-weight: 800;
            letter-spacing: 0.4px;
            line-height: 1.15;
        }

        .swish-number-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            text-decoration: none;
            border-radius: 14px;
        }

        .text-muted {
            color: var(--stats-muted) !important;
        }

        @media (max-width: 768px) {
            .stats-sponsors {
                --gap: 16px;
                margin-top: 18px;
                padding-top: 14px;
            }

            .qr-switch-inline {
                top: 10px;
                right: 10px;
            }

            .donation-side-col .stats-v2-card {
                padding-top: 60px !important;
            }
        }

        .rocket {
            position: fixed;
            width: 6px;
            height: 22px;
            border-radius: 999px;
            background: linear-gradient(180deg, #f8f9fa 0%, #198754 100%);
            box-shadow: 0 0 12px rgba(13, 110, 253, 0.8);
            z-index: 9999;
            pointer-events: none;
            animation: rocket-up 850ms ease-out forwards;
        }

        @keyframes rocket-up {
            from {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            to {
                transform: translateY(-65vh) scale(0.85);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="container stats-v2-wrap">
        <div id="statsLayout" class="row g-4 stats-layout">
            <div id="statsMainCol" class="col-12 col-lg-9 stats-main-col">
                <div class="stats-v2-card stats-v2-card-main bg-white p-4 p-md-5 h-100">
                    <div class="theme-switch-corner" title="Dark mode">
                        <div class="corner-controls-row">
                            <a href="/" class="btn btn-outline-primary stats-v2-home-btn">
                                <i class="fas fa-home me-1"></i>Home
                            </a>
                            <label class="theme-switch">
                                <input id="themeToggleSwitch" type="checkbox" aria-label="Dark mode">
                                <span class="theme-slider"></span>
                            </label>
                        </div>
                    </div>
                    <div class="logo-corner">
                        <img src="img/Al-Salam-Center-Logo.png" alt="Al Salam logo" class="corner-logo">
                        <span class="badge bg-success px-3 py-2">LIVE</span>
                    </div>
                    <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 stats-top-row">
                        <div class="stats-brand">
                            <h2 class="mb-0">Tillsammans har vi:</h2>
                        </div>
                        <span class="badge bg-success px-3 py-2 live-badge-inline">LIVE</span>
                    </div>

                    <div class="mt-4">
                        <div id="totalAmount" class="stats-v2-total">0</div>
                        <p id="progressLabel" class="text-muted mb-0">0% av målet</p>
                    </div>

                    <div class="stats-v2-progress mt-3" role="progressbar" aria-label="Insamlingsstatus"
                        aria-valuemin="0" aria-valuemax="100">
                        <div id="progressBar" class="bar"></div>
                    </div>

                    <div class="d-flex justify-content-between text-muted mt-2">
                        <small>0 kr</small>
                        <small>10 000 000 kr</small>
                    </div>

                    <div id="milestones" class="milestones"></div>
                    <div class="stats-sponsors" aria-label="Sponsorer">
                        <div id="statsSponsorWrap" class="sponsor-wrap">
                            <div id="statsSponsorTrack" class="sponsor-track ltr" role="list"></div>
                        </div>
                    </div>

            <div id="statsResizeHandle" class="stats-divider" role="separator" aria-controls="statsMainCol statsSideCol"

                    <label id="swishQrToggleWrap" class="qr-switch-inline" for="swishQrToggle">
                        <span>Visa QR</span>
                        <span class="qr-switch">
                            <input id="swishQrToggle" type="checkbox" aria-label="Visa Swish QR">
                            <span class="qr-slider"></span>
                        </span>
                    </label>
                    <div class="donation-title-row">
                        <h4 id="topDonationsTitle" class="mb-0">Senaste 5 donationer</h4>
                    </div>
                    <div id="swishQrWrap" class="swish-qr-wrap d-none">
                        <img src="img/swishwakfQR.png" alt="Swish QR kod">
                        <a class="btn btn-success mt-3 swish-number swish-number-btn"
                            href="https://app.swish.nu/1/p/sw/?sw=1235000559&msg=Ramadan%20Alsalam" target="_blank"
                            rel="noopener noreferrer">
                            123 5000 559
                        </a>
                    </div>
                    <h4 id="qrDonationsTitle" class="mb-3 qr-donations-title d-none">Senaste 5 donationer</h4>
                    <ul id="last5List" class="donation-list"></ul>
                    <p id="lastUpdated" class="text-muted small mt-3 mb-0"></p>
                </div>
            </div>
        </div>
    </div>

    <div id="contact-us-placeholder"></div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="lib/wow/wow.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/waypoints/waypoints.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>
    <script src="js/main.js"></script>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxLXBaGS2rdrrvtFAxMGCAeK2elGSfbvRmjtxBhjbORf9gdHBHduzOXIzP2FCI501cMWA/exec";
        const CARD_API_URL = "https://script.google.com/macros/s/AKfycby4xd1YkqdDe-xvshIuMpj53wCLM9kUClwb84Qtx5amrPd6xrUjKjJxiYSdEppweq4/exec";
        const GOAL_AMOUNT = 10000000;
        const POLL_INTERVAL_MS = 5000;

        const totalAmountEl = document.getElementById("totalAmount");
        const progressLabelEl = document.getElementById("progressLabel");
        const progressBarEl = document.getElementById("progressBar");
        const milestonesEl = document.getElementById("milestones");
        const last5ListEl = document.getElementById("last5List");
        const lastUpdatedEl = document.getElementById("lastUpdated");
        const totalSwishEl = document.getElementById("totalSwish");
        const totalStripeEl = document.getElementById("totalStripe");
        const themeToggleSwitchEl = document.getElementById("themeToggleSwitch");
        const swishQrToggleEl = document.getElementById("swishQrToggle");
        const swishQrToggleWrapEl = document.getElementById("swishQrToggleWrap");
        const swishQrWrapEl = document.getElementById("swishQrWrap");
        const topDonationsTitleEl = document.getElementById("topDonationsTitle");
        const qrDonationsTitleEl = document.getElementById("qrDonationsTitle");
        const mobileQrQuery = window.matchMedia("(max-width: 768px)");
        const THEME_STORAGE_KEY = "alsalam-stats-v2-theme";
        const LAYOUT_STORAGE_KEY = "alsalam-stats-v2-main-width";
        const sponsorWrapEl = document.getElementById("statsSponsorWrap");
        const sponsorTrackEl = document.getElementById("statsSponsorTrack");
        const statsLayoutEl = document.getElementById("statsLayout");
        const statsResizeHandleEl = document.getElementById("statsResizeHandle");
        const desktopResizeQuery = window.matchMedia("(min-width: 992px)");
        const statsSponsorImages = [
            "privtaBarn.png",
            "a2m.png",
            "jcFlytt.png",
            "konsentdent.jpg",
            "360tandklinik.jpeg",
            "palmyra.png",
            "sweethouse.png",
            "astorptandlakare.png"
        ];

        let previousTotalAmount = null;
        let previousNewestDonationKey = null;
        let showSwishQr = false;
        let latestLast5Data = [];

        function parseAmount(value) {
            if (typeof value === "number") return value;
            if (typeof value !== "string") return 0;
            const normalized = value.replace(/\s/g, "").replace(/,/g, ".").replace(/[^\d.-]/g, "");
            const parsed = Number(normalized);
            return Number.isFinite(parsed) ? parsed : 0;
        }

        function formatSek(value) {
            return `${value.toLocaleString("sv-SE", {
                minimumFractionDigits: value % 1 === 0 ? 0 : 2,
                maximumFractionDigits: 2
            })} kr`;
        }

        function donationKey(donation) {
            const date = donation.date || "";
            const time = donation.time || "";
            const account = donation.account || "";
            const amount = parseAmount(donation.amount || 0);
            const message = donation.message || "";
            return `${date}|${time}|${account}|${amount}|${message}`;
        }

        function getPayload(json) {
            if (json && json.data && (json.data.totalAmount !== undefined || Array.isArray(json.data.last5))) {
                return json.data;
            }
            return json || {};
        }

        function parseStripeData(json) {
            const payload = json && json.data ? json.data : json;
            const result = { total: 0, donations: [] };

            if (Array.isArray(payload)) {
                payload.forEach((payment) => {
                    const amount = parseAmount(payment.Amount ?? payment.amount ?? 0);
                    result.total += amount;
                    result.donations.push({
                        date: payment.Date ?? payment.date ?? "",
                        time: payment.Datetime ?? payment.timestamp ?? payment.time ?? "",
                        amount,
                        message: payment.Message || payment.message || payment.customer_name || payment.customer_email || "Stripe"
                    });
                });
                return result;
            }

            result.total = parseAmount(payload.total_stripe ?? payload.total_card ?? payload.totalAmount ?? 0);
            const recent = Array.isArray(payload.recent_payments) ? payload.recent_payments : (Array.isArray(payload.last5) ? payload.last5 : []);
            recent.forEach((payment) => {
                const amount = parseAmount(payment.Amount ?? payment.amount ?? 0);
                result.donations.push({
                    date: payment.Date ?? payment.date ?? "",
                    time: payment.Datetime ?? payment.timestamp ?? payment.time ?? "",
                    amount,
                    message: payment.Message || payment.Messages || payment.message || payment.customer_name || payment.customer_email || "Stripe"
                });
            });

            return result;
        }

        function toSortableTimestamp(donation) {
            const dateText = donation.date ? String(donation.date).trim() : "";
            const timeText = donation.time ? String(donation.time).trim() : "";
            const combined = `${dateText} ${timeText}`.trim();
            const parsed = new Date(combined);
            if (!Number.isNaN(parsed.getTime())) return parsed.getTime();
            const fallback = new Date(timeText);
            return Number.isNaN(fallback.getTime()) ? 0 : fallback.getTime();
        }

        function renderMilestones(totalAmount) {
            const milestoneSteps = [3, 4, 5, 6, 7, 8, 9, 10];
            const nextMilestone = milestoneSteps.find((step) => totalAmount < step * 1000000) ?? 10;
            milestonesEl.innerHTML = "";

            for (const i of milestoneSteps) {
                const pill = document.createElement("span");
                pill.className = `milestone-pill ${i === nextMilestone ? "closest" : ""}`;
                const milestoneTarget = i * 1000000;
                const leftAmount = Math.max(milestoneTarget - totalAmount, 0);
                pill.textContent = i === nextMilestone ? `${i} M • kvar ${formatSek(leftAmount)}` : `${i} M`;
                milestonesEl.appendChild(pill);
            }
        }

        function renderTotal(totalAmount, swishAmount, stripeAmount) {
            const clampedPercent = Math.min((totalAmount / GOAL_AMOUNT) * 100, 100);
            totalAmountEl.innerHTML = `${totalAmount.toLocaleString("sv-SE", {
                minimumFractionDigits: totalAmount % 1 === 0 ? 0 : 2,
                maximumFractionDigits: 2
            })}<span class="stats-v2-total-suffix"> kr</span>`;
            totalSwishEl.textContent = formatSek(swishAmount);
            totalStripeEl.textContent = formatSek(stripeAmount);
            progressLabelEl.textContent = `${clampedPercent.toFixed(2)}% av målet`;
            progressBarEl.style.width = `${clampedPercent}%`;
            progressBarEl.parentElement.setAttribute("aria-valuenow", clampedPercent.toFixed(2));
            renderMilestones(totalAmount);
        }

        function renderLast5(last5) {
            last5ListEl.innerHTML = "";

            if (!Array.isArray(last5) || last5.length === 0) {
                const empty = document.createElement("li");
                empty.className = "text-muted";
                empty.textContent = "Inga donationer ännu.";
                last5ListEl.appendChild(empty);
                return;
            }

            last5.slice(0, 5).forEach((donation) => {
                const li = document.createElement("li");
                li.className = "donation-item";

                const amount = parseAmount(donation.amount);
                const time = formatTimeHHMM(donation.time || "");
                const message = donation.message ? String(donation.message).trim() : "";
                const messageHtml = message ? `<div class="donation-message">“${message}”</div>` : "";

                li.innerHTML = `
                    <div>
                        <div class="meta"><strong>Tid:</strong> ${time}</div>
                        ${messageHtml}
                    </div>
                    <div class="donation-amount">${formatSek(amount)}</div>
                `;

                last5ListEl.appendChild(li);
            });
        }

        function applySwishQrMode(last5) {
            const forceMobileQr = mobileQrQuery.matches;
            const shouldShowQr = forceMobileQr || showSwishQr;

            swishQrWrapEl.classList.toggle("d-none", !shouldShowQr);
            swishQrToggleWrapEl.classList.toggle("d-none", forceMobileQr);
            swishQrToggleEl.checked = shouldShowQr;
            topDonationsTitleEl.classList.toggle("d-none", shouldShowQr);
            qrDonationsTitleEl.classList.add("d-none");
            renderLast5(last5);
        }

        function formatTimeHHMM(timeValue) {
            if (!timeValue) return "--:--";
            const text = String(timeValue).trim();
            const match = text.match(/(\d{1,2}):(\d{2})/);
            if (match) {
                const hours = match[1].padStart(2, "0");
                return `${hours}:${match[2]}`;
            }
            return "--:--";
        }

        function buildSponsorItemsHtml(images) {
            return images.map((name) => {
                const safeName = name.replace(/[-_]/g, " ").replace(/\..+$/, "");
                return `
                    <div class="sponsor-item" role="listitem">
                        <img src="img/sponsors/${name}" alt="${safeName}">
                    </div>
                `;
            }).join("");
        }

        function waitForSponsorImages(imgElements) {
            return Promise.all(Array.from(imgElements).map((img) => {
                if (img.complete) return Promise.resolve();
                return new Promise((resolve) => {
                    img.onload = img.onerror = resolve;
                });
            }));
        }

        async function initStatsSponsors() {
            if (!sponsorWrapEl || !sponsorTrackEl || sponsorTrackEl.dataset.ready === "true") return;
            if (!statsSponsorImages.length) return;

            const singleTrackHtml = buildSponsorItemsHtml(statsSponsorImages);
            sponsorTrackEl.innerHTML = singleTrackHtml + singleTrackHtml;
            await waitForSponsorImages(sponsorTrackEl.querySelectorAll("img"));

            sponsorTrackEl.dataset.ready = "true";
            sponsorWrapEl.classList.add("is-ready");
        }

        function updateStatsLayoutWidth(widthPercent) {
            if (!statsLayoutEl || !statsResizeHandleEl) return;

            const clampedWidth = Math.min(Math.max(widthPercent, 58), 82);
            statsLayoutEl.style.setProperty("--stats-main-width", `${clampedWidth}%`);
            statsResizeHandleEl.setAttribute("aria-valuenow", String(Math.round(clampedWidth)));
            localStorage.setItem(LAYOUT_STORAGE_KEY, String(clampedWidth));
        }

        function initResizableLayout() {
            if (!statsLayoutEl || !statsResizeHandleEl) return;

            const defaultWidth = 75;
            const savedWidth = Number(localStorage.getItem(LAYOUT_STORAGE_KEY));
            updateStatsLayoutWidth(Number.isFinite(savedWidth) ? savedWidth : defaultWidth);

            let isResizing = false;

            const handlePointerMove = (event) => {
                if (!isResizing || !desktopResizeQuery.matches) return;

                const layoutRect = statsLayoutEl.getBoundingClientRect();
                const nextWidth = ((event.clientX - layoutRect.left) / layoutRect.width) * 100;
                updateStatsLayoutWidth(nextWidth);
            };

            const stopResize = () => {
                if (!isResizing) return;

                isResizing = false;
                statsLayoutEl.classList.remove("is-resizing");
                document.body.classList.remove("stats-is-resizing");
                window.removeEventListener("pointermove", handlePointerMove);
                window.removeEventListener("pointerup", stopResize);
                window.removeEventListener("pointercancel", stopResize);
            };

            statsResizeHandleEl.addEventListener("pointerdown", (event) => {
                if (!desktopResizeQuery.matches) return;

                isResizing = true;
                statsLayoutEl.classList.add("is-resizing");
                document.body.classList.add("stats-is-resizing");
                statsResizeHandleEl.focus();
                event.preventDefault();

                window.addEventListener("pointermove", handlePointerMove);
                window.addEventListener("pointerup", stopResize);
                window.addEventListener("pointercancel", stopResize);
            });

            statsResizeHandleEl.addEventListener("dblclick", () => {
                updateStatsLayoutWidth(defaultWidth);
            });

            statsResizeHandleEl.addEventListener("keydown", (event) => {
                if (!desktopResizeQuery.matches) return;
                if (event.key !== "ArrowLeft" && event.key !== "ArrowRight") return;

                event.preventDefault();
                const currentWidth = parseFloat(statsLayoutEl.style.getPropertyValue("--stats-main-width")) || defaultWidth;
                updateStatsLayoutWidth(currentWidth + (event.key === "ArrowLeft" ? -2 : 2));
            });

            desktopResizeQuery.addEventListener("change", (event) => {
                if (!event.matches) {
                    stopResize();
                    statsLayoutEl.style.removeProperty("--stats-main-width");
                    return;
                }

                const restoredWidth = Number(localStorage.getItem(LAYOUT_STORAGE_KEY));
                updateStatsLayoutWidth(Number.isFinite(restoredWidth) ? restoredWidth : defaultWidth);
            });
        }

        function setTheme(theme) {
            const isDark = theme === "dark";
            document.body.classList.toggle("theme-dark", isDark);
            themeToggleSwitchEl.checked = isDark;
            localStorage.setItem(THEME_STORAGE_KEY, isDark ? "dark" : "light");
        }

        function initTheme() {
            const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
            if (savedTheme === "dark" || savedTheme === "light") {
                setTheme(savedTheme);
                return;
            }
            setTheme("light");
        }

        function launchRocket(originXPercent, colorHue = 220) {
            const rocket = document.createElement("div");
            rocket.className = "rocket";
            rocket.style.left = `${originXPercent}vw`;
            rocket.style.bottom = "0";
            rocket.style.background = `linear-gradient(180deg, #f8f9fa 0%, hsl(${colorHue}, 85%, 50%) 100%)`;
            rocket.style.boxShadow = `0 0 12px hsla(${colorHue}, 85%, 50%, 0.8)`;
            document.body.appendChild(rocket);

            rocket.addEventListener("animationend", () => {
                rocket.remove();
                confetti({
                    particleCount: 70,
                    spread: 70,
                    startVelocity: 45,
                    ticks: 220,
                    origin: { x: Math.min(Math.max(originXPercent / 100, 0.05), 0.95), y: 0.28 }
                });
            }, { once: true });
        }

        function triggerFireworks(power = 1) {
            const safePower = Math.min(Math.max(power, 1), 12);
            const particleCount = Math.round(40 + safePower * 15);
            const spread = Math.min(120, 55 + safePower * 4);

            confetti({
                particleCount,
                spread,
                startVelocity: 50,
                ticks: 250,
                origin: { x: 0.2, y: 0.6 }
            });
            confetti({
                particleCount,
                spread,
                startVelocity: 50,
                ticks: 250,
                origin: { x: 0.8, y: 0.6 }
            });
            setTimeout(() => {
                confetti({
                    particleCount: Math.round(particleCount * 0.8),
                    spread: spread + 10,
                    startVelocity: 45,
                    ticks: 240,
                    origin: { x: 0.5, y: 0.4 }
                });
            }, 220);
        }

        function celebrateDonation(amount) {
            const intensity = Math.max(1, Math.min(10, Math.ceil(amount / 500)));
            const rockets = Math.max(1, Math.min(8, Math.ceil(amount / 1000)));

            triggerFireworks(intensity);

            for (let i = 0; i < rockets; i += 1) {
                const origin = 10 + Math.random() * 80;
                const hue = 180 + Math.round(Math.random() * 120);
                setTimeout(() => launchRocket(origin, hue), i * 150);
            }
        }

        function celebrateMilestone(milestoneNumber) {
            triggerFireworks(6 + Math.min(milestoneNumber, 4));
            for (let i = 0; i < 6; i += 1) {
                setTimeout(() => launchRocket(12 + i * 14, 30 + i * 35), i * 100);
            }
        }

        function maybeTriggerCelebrations(totalAmount, last5) {
            if (previousTotalAmount === null) {
                previousTotalAmount = totalAmount;
                if (Array.isArray(last5) && last5.length > 0) {
                    previousNewestDonationKey = donationKey(last5[0]);
                }
                return;
            }

            if (totalAmount > previousTotalAmount) {
                const increase = totalAmount - previousTotalAmount;

                const newestDonation = Array.isArray(last5) && last5.length > 0 ? last5[0] : null;
                const newestKey = newestDonation ? donationKey(newestDonation) : null;
                const newestAmount = newestDonation ? parseAmount(newestDonation.amount || 0) : 0;

                if (newestKey && newestKey !== previousNewestDonationKey) {
                    celebrateDonation(Math.max(newestAmount, increase));
                } else {
                    celebrateDonation(increase);
                }

                const previousMilestone = Math.floor(previousTotalAmount / 1000000);
                const currentMilestone = Math.floor(totalAmount / 1000000);
                for (let milestone = previousMilestone + 1; milestone <= Math.min(currentMilestone, 10); milestone += 1) {
                    setTimeout(() => celebrateMilestone(milestone), 500 + (milestone - previousMilestone - 1) * 450);
                }
            }

            previousTotalAmount = totalAmount;
            if (Array.isArray(last5) && last5.length > 0) {
                previousNewestDonationKey = donationKey(last5[0]);
            }
        }

        async function refreshStats() {
            try {
                const [swishResponse, stripeResponse] = await Promise.allSettled([
                    fetch(API_URL, { cache: "no-store" }),
                    fetch(CARD_API_URL, { cache: "no-store" })
                ]);

                if (swishResponse.status !== "fulfilled" || !swishResponse.value.ok) {
                    throw new Error("Swish request failed");
                }

                const swishJson = await swishResponse.value.json();
                const swishPayload = getPayload(swishJson);
                const swishTotal = parseAmount(swishPayload.totalAmount || 0);
                const swishLast5 = Array.isArray(swishPayload.last5) ? swishPayload.last5 : [];

                let stripeTotal = 0;
                let stripeRecent = [];
                if (stripeResponse.status === "fulfilled" && stripeResponse.value.ok) {
                    const stripeJson = await stripeResponse.value.json();
                    const stripeParsed = parseStripeData(stripeJson);
                    stripeTotal = stripeParsed.total;
                    stripeRecent = stripeParsed.donations;
                }

                const totalAmount = swishTotal + stripeTotal;
                const last5 = [...swishLast5, ...stripeRecent]
                    .sort((a, b) => toSortableTimestamp(b) - toSortableTimestamp(a))
                    .slice(0, 5);

                latestLast5Data = last5;
                renderTotal(totalAmount, swishTotal, stripeTotal);
                applySwishQrMode(latestLast5Data);
                maybeTriggerCelebrations(totalAmount, last5);

                const now = new Date();
                lastUpdatedEl.textContent = `Senast uppdaterad: ${now.toLocaleString("sv-SE")}`;
            } catch (error) {
                console.error("Failed to refresh stats", error);
                lastUpdatedEl.textContent = "Kunde inte hämta data just nu.";
            }
        }

        $(function () {
            $("#contact-us-placeholder").load("contact-us.html", function () {
                if (window.reapplyTranslations) {
                    setTimeout(() => window.reapplyTranslations(), 50);
                }
            });
        });

        initStatsSponsors();
        initResizableLayout();
        refreshStats();
        setInterval(refreshStats, POLL_INTERVAL_MS);

        initTheme();
        themeToggleSwitchEl.addEventListener("change", () => {
            setTheme(themeToggleSwitchEl.checked ? "dark" : "light");
        });

        swishQrToggleEl.addEventListener("change", () => {
            showSwishQr = swishQrToggleEl.checked;
            applySwishQrMode(latestLast5Data);
        });

        mobileQrQuery.addEventListener("change", () => {
            applySwishQrMode(latestLast5Data);
        });
    </script>
</body>
